<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizonte Blue - Login</title>
    <link href="style.css" rel="stylesheet"> 
</head>

<body>
    <header class="formatacao">
        <h1 class="formatacao1">Horizonte Blue</h1>
    </header>
    <nav class="formatacao2">
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="sobre.html">Sobre</a></li>
            <li><a href="destinos.html">Destinos</a></li>
            <li><a href="login.html">Entrar</a></li>
        </ul>
    </nav>

    <div class="login-container">
        <form id="login-form" class="login-box">
            <h2>Entre na sua conta</h2>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Digite seu e-mail" required>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>
            </div>

            <button type="submit">Entrar</button>

            <p id="mensagem" class="mensagem"></p>

            <p class="cadastro">
            Ainda não é cadastrado? <a href="cadastro.html">Clique aqui</a>
            </p>
        </form>
    </div>

    <footer class="formatacaoF">
        © 2026 Horizonte Blue - Viagens & Turismo 
        <br><br>
        Contato: (11) 9999-9999 | contato@horizonteblue.com.br
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
